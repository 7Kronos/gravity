# Gravity DSL emitter configuration consumed by the C# emitter at build time.
#
# - `output` is the per-emitter subdirectory under <GravityDslOutputDir>
#   (the default is `obj/<config>/<tfm>/Generated/`). The MSBuild target's
#   <Compile> glob looks for *.cs under `<GravityDslOutputDir>/csharp/**`,
#   so the value must be `csharp` for the auto-compile hook to pick the files up.
# - `namespace` is prepended to each entity file's `namespace <ns>;` declaration:
#   a Hr.gravity that declares `namespace hr;` emits `namespace AcmeCo.Domain.hr;`.
emitters:
  csharp:
    output: csharp
    namespace: AcmeCo.Domain
    file_scoped_namespaces: true
